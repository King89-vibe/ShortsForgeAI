name: Build APK

on:
  workflow_dispatch:

  jobs:
    build:
        runs-on: ubuntu-latest

            steps:
                - uses: actions/checkout@v3

                    - uses: actions/setup-java@v3
                          with:
                                  distribution: 'temurin'
                                          java-version: '17'

                                              - uses: android-actions/setup-android@v3

                                                  - name: Create Gradle Wrapper
                                                        run: gradle wrapper

                                                            - name: Setup Project
                                                                  run: |
                                                                          mkdir -p app/src/main/java/com/shortsforge/ai
                                                                                  mkdir -p app/src/main/res/layout

                                                                                          echo "rootProject.name='ShortsForgeAI'" > settings.gradle
                                                                                                  echo "include ':app'" >> settings.gradle

                                                                                                          echo "buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } } allprojects { repositories { google(); mavenCentral() } }" > build.gradle

                                                                                                                  cat <<EOF > app/build.gradle
                                                                                                                          plugins {
                                                                                                                                      id 'com.android.application'
                                                                                                                                                  id 'org.jetbrains.kotlin.android'
                                                                                                                                                          }

                                                                                                                                                                  android {
                                                                                                                                                                              compileSdk 34

                                                                                                                                                                                          defaultConfig {
                                                                                                                                                                                                          applicationId "com.shortsforge.ai"
                                                                                                                                                                                                                          minSdk 24
                                                                                                                                                                                                                                          targetSdk 34
                                                                                                                                                                                                                                                          versionCode 1
                                                                                                                                                                                                                                                                          versionName "1.0"
                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                  buildTypes {
                                                                                                                                                                                                                                                                                                                  release {
                                                                                                                                                                                                                                                                                                                                      minifyEnabled false
                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                  dependencies {
                                                                                                                                                                                                                                                                                                                                                                                              implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                                                                                                                                                                                                                                                                                                                                                                                                          implementation 'androidx.appcompat:appcompat:1.6.1'
                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                          EOF

                                                                                                                                                                                                                                                                                                                                                                                                                                  cat <<EOF > app/src/main/AndroidManifest.xml
                                                                                                                                                                                                                                                                                                                                                                                                                                          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                                                                                                                                                                                                                                                                                                                                                                                                                                                      package="com.shortsforge.ai">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <application android:label="ShortsForgeAI">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <activity android:name=".MainActivity">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <intent-filter>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <action android:name="android.intent.action.MAIN"/>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <category android:name="android.intent.category.LAUNCHER"/>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </intent-filter>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </activity>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </application>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </manifest>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      EOF

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              cat <<EOF > app/src/main/java/com/shortsforge/ai/MainActivity.kt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      package com.shortsforge.ai

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              import android.os.Bundle
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      import androidx.appcompat.app.AppCompatActivity

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              class MainActivity : AppCompatActivity() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          override fun onCreate(savedInstanceState: Bundle?) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          super.onCreate(savedInstanceState)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      EOF

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Build APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: ./gradlew assembleDebug

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Upload APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: app-debug-apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                path: app/build/outputs/apk/debug/*.apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                